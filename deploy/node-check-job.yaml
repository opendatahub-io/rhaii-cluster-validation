apiVersion: batch/v1
kind: Job
metadata:
  name: rhaii-validate-check
  namespace: rhaii-validation
  labels:
    app: rhaii-validate-check
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: rhaii-validate-check
    spec:
      # Universal toleration: GPU nodes carry platform-specific taints
      # (nvidia.com/gpu, sku=gpu on AKS, custom taints on CoreWeave/EKS)
      # that we cannot fully enumerate. The nodeSelector on
      # kubernetes.io/hostname is the primary scheduling constraint that
      # pins the pod to a specific GPU node; this toleration ensures the
      # pod is not rejected by unexpected taints on that node.
      tolerations:
        - operator: Exists
      containers:
        - name: checker
          image: ${IMG}
          imagePullPolicy: Always
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          args:
            - run
            - --node-name
            - $(NODE_NAME)
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/rhaii-validate
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: rhaii-validate-config
            optional: true
      restartPolicy: Never
      serviceAccountName: rhaii-validator
