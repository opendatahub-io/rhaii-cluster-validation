apiVersion: v1
kind: Namespace
metadata:
  name: rhaii-validation
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhaii-validator
  namespace: rhaii-validation
---
# Empty ClusterRole: the SA exists only as an SCC subject on OpenShift.
# The controller runs under the invoking admin's kubeconfig, not this SA.
# Workload pods (check Jobs, bandwidth Jobs) never call the Kubernetes API.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhaii-validator
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhaii-validator
subjects:
  - kind: ServiceAccount
    name: rhaii-validator
    namespace: rhaii-validation
roleRef:
  kind: ClusterRole
  name: rhaii-validator
  apiGroup: rbac.authorization.k8s.io
